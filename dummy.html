<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Under Construction</title>
    <link rel="stylesheet" href="style.css">
    <style>
body, html {
    height: 100%;
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #f4f4f4; /* A light background */
    display: flex;
    justify-content: center;
    align-items: center;
    color: #333;
}

.main-container {
    text-align: center;
    width: 80%;
    max-width: 800px;
}

header h1 {
    font-size: 8rem;
    margin: 0;
    color: #e0e0e0; /* Faded for focus on the building */
}

.construction-text {
    font-style: italic;
    color: #888;
    margin-bottom: 20px;
}

/* Base style for the SVG */
#university-building {
    width: 100%;
    height: auto;
    stroke: black; /* The color of the lines */
    stroke-width: 2;
    fill: none;
    display: block;
    margin: 0 auto;
}

/* Target all paths that should draw themselves */
.draw-line {
    /* We set a large dasharray, and an equally large offset.
       The offset pushes the line 'out of view'. */
    stroke-dasharray: 2000;
    stroke-dashoffset: 2000;
    transition: stroke-dashoffset 4s ease-in-out;
}

/* This class will be applied by JavaScript to start the drawing */
.start-drawing .draw-line {
    stroke-dashoffset: 0; /* Animate the offset back to 0 to draw the line */
}

/* Stagger the animation: draw the main structure first, then details */
.building-structure .draw-line {
    transition-delay: 0.5s;
}

.windows-details .draw-line {
    transition-delay: 2.5s;
}

.special-details .draw-line {
    transition-delay: 1.5s;
}

/* Small adjustments for the flagpole */
#flagpole {
    stroke-width: 1.5;
}

footer.controls {
    margin-top: 30px;
}

button {
    padding: 10px 20px;
    background-color: #5c6bc0;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 1rem;
    transition: background-color 0.3s;
}

button:hover {
    background-color: #3f51b5;
}
</style>
</head>
<body>
    <div class="main-container">
        <header>
            <h1>404</h1>
            <p class="construction-text">Foundations are set. Lines are drawing. Something is building here.</p>
        </header>

        <svg id="university-building" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600">
            <g class="building-structure">
                <path class="draw-line" d="M100 200 H300 V100 H700 V200 H900 V500 H100 Z" />
                <path class="draw-line" d="M300 100 L500 20 Z" /> </g>
            <g class="windows-details">
                <path class="draw-line" d="M150 250 H250 M150 300 H250 M150 350 H250 V250 H150 Z" />
                <path class="draw-line" d="M350 150 H650 M350 200 H650 M350 250 H650 V150 H350 Z" />
                <path class="draw-line" d="M750 250 H850 M750 300 H850 M750 350 H850 V250 H750 Z" />
                
                <path class="draw-line" d="M400 400 H600 V500 H400 Z" />
                <path class="draw-line" d="M380 500 H620 V520 H380 Z" />
            </g>
            <g class="special-details">
                <path class="draw-line" id="flagpole" d="M500 100 V10" />
                
                <rect class="draw-line" x="350" y="270" width="300" height="60" rx="5" ry="5" />
            </g>
        </svg>

        <footer class="controls">
            <button id="restartBtn">Rebuild</button>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
<script>
window.addEventListener('load', function() {
    // Add the class that triggers the animation defined in CSS
    document.getElementById('university-building').classList.add('start-drawing');
});

// A small utility function to restart the animation
document.getElementById('restartBtn').addEventListener('click', function() {
    const building = document.getElementById('university-building');
    // We must temporarily remove the class to reset the transitions
    building.classList.remove('start-drawing');
    
    // Use a tiny timeout to ensure the class removal is processed before re-adding it
    setTimeout(() => {
        building.classList.add('start-drawing');
    }, 50);
});
</script>
</html>
