<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - SOET</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        /* Reset margins and set font */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* 1. The Background: Campus image with a dark overlay */
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            padding-right: 40%;
            justify-content: center;
            /* We are using an Unsplash campus photo here. You can change the URL to your own University Campus image later! */
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.7)), 
                        url('images/madhavbhavan.png') center/cover no-repeat;
        }

        /* 2. The Glass Card */
        .login-card {
            background: rgba(255, 255, 255, 0.95); /* Mostly white, slightly transparent */
            backdrop-filter: blur(10px); /* The frosted glass effect */
            padding: 40px 35px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
            text-align: center;
            border-top: 5px solid #800000; /* University Maroon accent line */
        }

        /* 3. Typography & Logo */
        .logo-img {
            width: 70px;
            margin-bottom: 15px;
        }
        h2 {
            color: #800000;
            font-size: 22px;
            margin-bottom: 5px;
            line-height: 1.2;
        }
        p.subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
            font-weight: 500;
        }

        /* 4. Input Fields with Icons */
        .input-group {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group label {
            display: block;
            font-size: 13px;
            color: #333;
            margin-bottom: 6px;
            font-weight: 600;
        }
        .input-group i {
            position: absolute;
            left: 15px;
            top: 36px;
            color: #888;
            font-size: 14px;
        }
        .input-group input {
            width: 100%;
            padding: 12px 15px 12px 40px; /* Extra padding on the left for the icon */
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: #f9f9f9;
        }
        .input-group input:focus {
            border-color: #800000;
            background: #fff;
            outline: none;
            box-shadow: 0 0 0 3px rgba(128, 0, 0, 0.1);
        }

        /* 5. The Buttons */
        .btn-login {
            width: 100%;
            padding: 12px;
            background: #800000;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn-login:hover {
            background: #600000;
            box-shadow: 0 5px 15px rgba(128, 0, 0, 0.3);
            transform: translateY(-1px);
        }

        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: #555;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: 0.2s;
        }
        .back-link:hover {
            color: #800000;
        }
        .back-link i {
            margin-right: 5px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="images/logo.png" alt="University Logo" class="logo-img" onerror="this.style.display='none'">
        
        <h2>Samrat Vikramaditya Vishwavidyalaya</h2>
        <p class="subtitle">SOET Student Portal</p>

        <form action="#" method="POST">
            <div class="input-group">
                <label for="enrollment">Enrollment Number</label>
                <i class="fa-solid fa-id-card"></i>
                <input type="text" id="enrollment" placeholder="e.g. V24R123456789">
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn-login">Sign In <i class="fa-solid fa-arrow-right-to-bracket" style="margin-left: 5px;"></i></button>
        </form>

        <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Return to Homepage</a>
    </div>

</body>
</html>
