<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOET Preloader</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        #content {
            display: none;
            min-height: 100vh;
            text-align: center;
            padding: 2rem 1.25rem;
        }

        #content main {
            max-width: 720px;
            margin: 0 auto;
        }

        #content a {
            color: #800000;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div id="preloader">
        <div class="loader-content">
            <img src="images/logo.png" class="logo" alt="SOET logo">
            <h2>School of Engineering and Technology</h2>
            <div class="spinner"></div>
        </div>
    </div>

    <div id="content">
        <main>
            <h1>Preloader Preserved</h1>
            <p>This page isolates the website preloader animation.</p>
            <p><a href="index.html">Go to Home Page</a></p>
        </main>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
