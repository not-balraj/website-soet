<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - SOET Ujjain</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            background: #f7f3ea;
            color: #1f1f1f;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        .error-wrap {
            width: min(680px, 92%);
            text-align: center;
            background: #ffffff;
            border: 1px solid #e2d8c4;
            border-radius: 14px;
            padding: 2rem 1.4rem;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
        }

        .error-code {
            margin: 0;
            color: #800000;
            font-size: clamp(3rem, 10vw, 5rem);
            line-height: 1;
        }

        .home-link {
            display: inline-block;
            margin-top: 1rem;
            color: #800000;
            font-weight: 700;
            text-decoration: none;
            border-bottom: 2px solid #800000;
        }

        .home-link:hover {
            color: #5f0000;
            border-bottom-color: #5f0000;
        }
    </style>
</head>
<body>
    <main class="error-wrap" aria-labelledby="error-title">
        <h1 id="error-title" class="error-code">404</h1>
        <p>The page you are looking for could not be found.</p>
        <p><strong>School of Engineering and Technology, Ujjain</strong></p>
        <p>Vikram University, Ujjain</p>
        <a class="home-link" href="index.html">Go to Home Page</a>
    </main>
</body>
</html>
